<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Toy Story</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow-x: hidden;
            background: linear-gradient(to bottom, #4ba3e3 0%, #7bc6f6 100%);
            font-family: 'Arial Black', Impact, sans-serif;
            min-height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ----- FONDO DE NUBES ANIMADAS ----- */
        .sky {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            width: 120px;
            height: 40px;
            border-radius: 20px;
            animation: moveClouds linear infinite;
        }

        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
        }

        .cloud::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud::after { width: 70px; height: 70px; top: -45px; left: 40px; }

        .c1 { top: 10%; left: -150px; transform: scale(0.8); animation-duration: 22s; }
        .c2 { top: 25%; left: -150px; transform: scale(1.1); animation-duration: 32s; animation-delay: 4s; }
        .c3 { top: 60%; left: -150px; transform: scale(0.7); animation-duration: 26s; animation-delay: 8s; }
        .c4 { top: 80%; left: -150px; transform: scale(0.9); animation-duration: 28s; animation-delay: 2s; }

        @keyframes moveClouds {
            0% { left: -150px; }
            100% { left: 100vw; }
        }

        /* ----- CONTENEDOR PRINCIPAL (ESTILO CAJA DE JUGUETES) ----- */
        .invitation-card {
            background: #ffffff;
            border: 8px solid #e41a22;
            border-radius: 25px;
            padding: 30px 20px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.3), inset 0 0 15px rgba(0,0,0,0.1);
            position: relative;
            z-index: 2;
            animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* ----- LOGO / TITULO TOY STORY ----- */
        .toy-title {
            font-size: 3rem;
            color: #fde100;
            text-shadow: 
                -3px -3px 0 #e41a22,  
                 3px -3px 0 #e41a22,
                -3px  3px 0 #e41a22,
                 3px  3px 0 #e41a22,
                 5px  5px 0 #1c355e;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .toy-subtitle {
            font-size: 1.4rem;
            color: #1c355e;
            margin-bottom: 25px;
            font-family: sans-serif;
            font-weight: bold;
        }

        /* ----- CUADROS DE INFORMACIÓN ----- */
        .info-box {
            background: #f4f9fd;
            border: 3px dashed #4ba3e3;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .info-box h3 {
            color: #e41a22;
            font-size: 1.1rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .info-box p {
            color: #333333;
            font-size: 1.2rem;
            font-family: sans-serif;
            font-weight: 600;
        }

        /* ----- BOTÓN DE CONFIRMACIÓN ----- */
        .btn-rsvp {
            display: inline-block;
            background: #fde100;
            color: #1c355e;
            border: 4px solid #e41a22;
            padding: 12px 25px;
            font-size: 1.2rem;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 15px;
            box-shadow: 0 5px 0 #bc1319;
            transition: all 0.1s ease;
        }

        .btn-rsvp:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #bc1319;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="sky">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>
        <div class="cloud c4"></div>
    </div>

    <div class="invitation-card">
        <h1 class="toy-title">¡MAJO!</h1>
        <h2 class="toy-subtitle">¡Cumple 3 Años al Estilo Toy Story!</h2>

        <div class="info-box">
            <h3>📅 ¿CUÁNDO ES?</h3>
            <p>Sábado, 20 de Junio</p>
        </div>

        <div class="info-box">
            <h3>⏰ ¿A QUÉ HORA?</h3>
            <p>A partir de las 4:00 PM</p>
        </div>

        <div class="info-box">
            <h3>📍 ¿DÓNDE ES?</h3>
            <p>Salón de Fiestas "La Caja de Juguetes"<br><span style="font-size: 0.9rem; color: #666;">Av. Principal #123, Ciudad de México</span></p>
        </div>

        <a href="https://wa.me/52XXXXXXXXXX?text=¡Hola!+Confirmo+mi+asistencia+al+cumpleaños+de+Majo" target="_blank" class="btn-rsvp">
            🚀 CONFIRMAR ASISTENCIA
        </a>
    </div>

</body>
</html>
