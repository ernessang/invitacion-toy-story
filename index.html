<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Aventura de Ivana - Toy Story</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #4ba3e3, #1a113c, #ff9e43, #ff6b6b);
            font-family: 'Arial Black', Impact, sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        /* Bloques de sección que ocupan toda la pantalla */
        .seccion {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr;
            align-items: center;
            justify-items: center;
            padding: 40px 20px;
            position: relative;
        }

        /* Caja de texto del centro */
        .contenedor-texto {
            max-width: 420px;
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            text-align: center;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* --- ESTILOS PARA QUE LOS JUGUETES FLOTEN A LOS LADOS --- */
        .juguete-flotante {
            position: absolute;
            max-height: 32vh;
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
            z-index: 5;
        }

        /* Posiciones fijas en los extremos de la pantalla */
        .izquierda-arriba  { left: 5%; top: 10%; }
        .izquierda-abajo   { left: 5%; bottom: 10%; }
        .derecha-arriba    { right: 5%; top: 10%; }
        .derecha-abajo     { right: 5%; bottom: 10%; }

        .story-text {
            font-size: 2.2rem;
            line-height: 1.3;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .highlight-blue { color: #fde100; }
        .highlight-green { color: #39ff14; }

        .photo-frame {
            width: 220px;
            height: 280px;
            background: #eee;
            border: 8px solid #fff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            margin: 20px auto;
            overflow: hidden;
        }

        .real-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn-rsvp {
            display: inline-block;
            background: #fde100;
            color: #1c355e;
            border: 4px solid #e41a22;
            padding: 15px 35px;
            font-size: 1.3rem;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 6px 0 #bc1319;
            font-weight: bold;
            margin-top: 15px;
        }

        /* Adaptación perfecta para celulares */
        @media (max-width: 768px) {
            .juguete-flotante {
                position: relative;
                max-height: 20vh;
                display: inline-block;
                margin: 10px 5px;
                left: auto !important;
                right: auto !important;
                top: auto !important;
                bottom: auto !important;
            }
            .seccion {
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="seccion">
        <div style="text-align: center;">
            <img src="assets/logo.png" alt="Toy Story Logo" style="width: 100%; max-width: 320px; margin-bottom: 20px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));">
            <h2 style="font-size: 1.8rem; text-shadow: 2px 2px 5px rgba(0,0,0,0.7); letter-spacing: 2px;">PRESENTA</h2>
        </div>
    </div>

    <div class="seccion">
        <img src="assets/wody.png" class="juguete-flotante izquierda-arriba" alt="Woody">
        <img src="assets/pelota.png" class="juguete-flotante izquierda-abajo" style="max-height: 12vh;" alt="Pelota Pixar">
        <img src="assets/cara-de-papa.png" class="juguete-flotante derecha-abajo" alt="Cara de Papa">

        <div class="contenedor-texto">
            <p class="story-text">La princesa <span class="highlight-blue">IVANA</span> cumplirá <span style="color: #e41a22;">3 Años</span> 👑</p>
        </div>
    </div>

    <div class="seccion">
        <img src="assets/buzz-running.png" class="juguete-flotante derecha-arriba" alt="Buzz">
        <img src="assets/control.png" class="juguete-flotante derecha-abajo" style="max-height: 12vh;" alt="Control">
        <img src="assets/tresmarcianos.png" class="juguete-flotante izquierda-abajo" alt="Aliens">

        <div class="contenedor-texto">
            <p class="story-text">¡Y te esperamos para el despegue este <span class="highlight-green">Sábado 4 de Julio</span>! 🚀</p>
        </div>
    </div>

    <div class="seccion">
        <img src="assets/bullseye.png" class="juguete-flotante izquierda-arriba" alt="Tiro al Blanco">
        <img src="assets/cactus.png" class="juguete-flotante izquierda-abajo" style="max-height: 16vh;" alt="Cactus">
        <img src="assets/jessie.png" class="juguete-flotante derecha-abajo" alt="Jessie">

        <div class="contenedor-texto">
            <p class="story-text" style="text-shadow: none;">La cita es en el Salón <br><span style="color: #e41a22; font-size: 2.5rem;">"El Castillo"</span></p>
            <p style="font-size: 1.4rem; margin: 15px 0; color: #fff;">A partir de las <strong>3:00 PM</strong> ⏰</p>
        </div>
    </div>

    <div class="seccion">
        <img src="assets/rex.png" class="juguete-flotante izquierda-abajo" style="transform: scaleX(-1);" alt="Rex">
        <img src="assets/hamm.png" class="juguete-flotante derecha-abajo" style="max-height: 20vh;" alt="Hamm">

        <div class="contenedor-texto">
            <div class="photo-frame">
                <img src="assets/ivana.jpg" class="real-photo" alt="Ivana">
            </div>
            <p class="story-text" style="font-size: 1.6rem; margin-bottom: 15px;">¿TE UNES A LA AVENTURA?</p>
            
            <a href="https://wa.me/525585473097?text=%C2%A1Hola!%20%F0%9F%91%8B%20Confirmo%20mi%20asistencia%20al%20cumplea%C3%B1os%20de%20Ivana%20%F0%9F%8E%89.%20%C2%A1Ah%C3%AD%20nos%20vemos%20para%20la%20aventura!%20%F0%9F%9A%80" target="_blank" class="btn-rsvp">
                🚀 CONFIRMAR ASISTENCIA
            </a>
        </div>
    </div>

</body>
</html>
