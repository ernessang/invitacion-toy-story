<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Parallax - Ivana</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #111;
            font-family: 'Arial Black', Impact, sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        /* ----- CONTENEDOR GENERAL PARALLAX ----- */
        .parallax-section {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
            padding: 20px;
        }

        /* ----- SECCIÓN 1: PIZZA PLANETA (BUZZ) ----- */
        #pizza-planet {
            /* Cuando tengas tu imagen la pones en assets/fondo_espacio.jpg */
            background: linear-gradient(135deg, #0f0c20 0%, #15102a 100%);
            z-index: 3;
        }

        .alien-layer {
            position: absolute;
            font-size: 4rem;
            pointer-events: none;
            transition: transform 0.1s ease-out;
            z-index: 1;
        }
        /* Posiciones iniciales de los marcianitos flotantes */
        #alien1 { top: 30%; left: 15%; }
        #alien2 { top: 60%; right: 15%; }

        /* ----- SECCIÓN 2: DATOS DEL EVENTO ----- */
        #event-details {
            background: #ffffff;
            color: #1c355e;
            z-index: 4;
            box-shadow: 0px -20px 40px rgba(0,0,0,0.5), 0px 20px 40px rgba(0,0,0,0.5);
        }

        .invitation-card {
            background: #ffffff;
            border: 8px solid #e41a22;
            border-radius: 25px;
            padding: 30px 20px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.2);
            transition: transform 0.1s ease-out;
        }

        .toy-title {
            font-size: 3rem;
            color: #fde100;
            text-shadow: -3px -3px 0 #e41a22, 3px -3px 0 #e41a22, -3px 3px 0 #e41a22, 3px 3px 0 #e41a22, 5px 5px 0 #1c355e;
            margin-bottom: 5px;
        }

        .info-box {
            background: #f4f9fd;
            border: 3px dashed #4ba3e3;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .info-box h3 { color: #e41a22; font-size: 1.1rem; margin-bottom: 5px; }
        .info-box p { font-size: 1.2rem; font-weight: bold; }

        /* ----- SECCIÓN 3: EL DESIERTO (WOODY) + CUMPLEAÑERA ----- */
        #woody-desert {
            /* Cuando tengas tu imagen del oeste la pones en assets/fondo_desierto.jpg */
            background: linear-gradient(to bottom, #ff9e43 0%, #ff6b6b 100%);
            z-index: 3;
        }

        .desert-element {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 200px;
            pointer-events: none;
            text-align: center;
        }

        /* Espacio reservado para la foto de Ivana al final */
        .photo-frame {
            width: 200px;
            height: 250px;
            background: #eee;
            border: 6px solid #fff;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: transform 0.1s ease-out;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn-rsvp {
            display: inline-block;
            background: #fde100;
            color: #1c355e;
            border: 4px solid #e41a22;
            padding: 15px 30px;
            font-size: 1.3rem;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 5px 0 #bc1319;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <section id="pizza-planet" class="parallax-section">
        <h1 id="space-text" style="font-size: 3.5rem; text-align: center; text-shadow: 0 0 10px #00ffcc;">¡PREPÁRATE PARA EL DESPEGUE!</h1>
        <p style="font-size: 1.5rem; margin-top: 20px; color: #00ffcc;">Desliza hacia abajo 🚀</p>
        
        <div id="alien1" class="alien-layer">👽</div>
        <div id="alien2" class="alien-layer">🚀</div>
    </section>

    <section id="event-details" class="parallax-section">
        <div class="invitation-card" id="main-card">
            <h1 class="toy-title">IVANA</h1>
            <h2 style="color: #1c355e; margin-bottom: 25px;">¡Cumple 3 Años!</h2>

            <div class="info-box">
                <h3>📅 ¿CUÁNDO ES?</h3>
                <p>Sábado, 4 de Julio de 2026</p>
            </div>
            <div class="info-box">
                <h3>⏰ ¿A QUÉ HORA?</h3>
                <p>A partir de las 3:00 PM</p>
            </div>
            <div class="info-box">
                <h3>📍 ¿DÓNDE ES?</h3>
                <p>Salón "El Castillo"</p>
            </div>
        </div>
    </section>

    <section id="woody-desert" class="parallax-section">
        <div class="photo-frame" id="ivana-photo">
            <img src="https://via.placeholder.com/200x250?text=Foto+Ivana" alt="Ivana Cumpleañera">
        </div>

        <h2 style="text-shadow: 2px 2px 5px rgba(0,0,0,0.5); margin-bottom: 25px; text-align: center;">¡TIENES UNA MISIÓN EN LA FIESTA!</h2>

        <a href="https://wa.me/525585473097?text=%C2%A1Hola!%20%F0%9F%91%8B%20Confirmo%20mi%20asistencia%20al%20cumplea%C3%B1os%20de%20Ivana%20%F0%9F%8E%89.%20%C2%A1Ah%C3%AD%20nos%20vemos%20para%20la%20aventura!%20%F0%9F%9A%80" target="_blank" class="btn-rsvp">
            🤠 CONFIRMAR ASISTENCIA
        </a>
    </section>

    <script>
        window.addEventListener('scroll', () => {
            // Guardamos el valor actual del scroll vertical
            const scrollValue = window.scrollY;

            // 1. Efecto Parallax en la Sección Espacial (Mover elementos del DOM a ritmos diferentes)
            const alien1 = document.getElementById('alien1');
            const alien2 = document.getElementById('alien2');
            const spaceText = document.getElementById('space-text');

            // El texto espacial sube un poco más lento que el scroll natural
            spaceText.style.transform = `translateY(${scrollValue * 0.4}px)`;
            
            // Los elementos flotantes se desplazan hacia arriba de forma exagerada dando profundidad
            alien1.style.transform = `translateY(${-scrollValue * 0.6}px) rotate(${scrollValue * 0.2}deg)`;
            alien2.style.transform = `translateY(${-scrollValue * 0.3}px) rotate(${-scrollValue * 0.1}deg)`;

            // 2. Efecto Parallax para la Foto en el desierto (Aparece flotando sutilmente)
            const ivanaPhoto = document.getElementById('ivana-photo');
            // Calculamos su movimiento relativo al final del scroll
            if(scrollValue > window.innerHeight * 1.2) {
                let desertScroll = scrollValue - (window.innerHeight * 1.2);
                ivanaPhoto.style.transform = `translateY(${-desertScroll * 0.15}px)`;
            }
        });
    </script>

</body>
</html>
