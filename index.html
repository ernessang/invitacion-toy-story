<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Aventura de Ivana - Toy Story</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            font-family: 'Arial Black', Impact, sans-serif;
            color: #fff;
            height: 600vh; 
        }

        /* ----- EL VISOR FIJO ----- */
        .viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: 1;
        }

        /* ----- FONDO MAESTRO CONTINUO ----- */
        #master-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, 
                #4ba3e3 0%,   /* Cuarto de Andy */
                #7bc6f6 15%,
                #1a113c 40%,  /* Pizza Planeta */
                #0b071e 65%,
                #ff9e43 85%,  /* El Desierto */
                #ff6b6b 100%
            );
            background-size: 100% 600%;
            background-position: top center;
            transition: background-position 0.4s ease-out;
        }

        /* ----- EFECTOS AMBIENTALES POR CAPAS ----- */
        .ambient-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
            z-index: 2;
        }

        /* DETALLE 1: Nubes del cuarto de Andy */
        .cloud-particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            width: 80px;
            height: 25px;
            border-radius: 20px;
            animation: drift linear infinite;
        }
        .cloud-particle::before {
            content: ''; position: absolute; background: rgba(255, 255, 255, 0.4);
            width: 40px; height: 40px; top: -20px; left: 10px; border-radius: 50%;
        }
        @keyframes drift {
            0% { left: -100px; }
            100% { left: 100vw; }
        }

        /* DETALLE 2: Estrellas de Pizza Planeta */
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: blink infinite ease-in-out;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); background: #00ffcc; }
        }

        /* DETALLE 3: Polvo dorado del Desierto */
        .dust {
            position: absolute;
            background: rgba(255, 225, 100, 0.6);
            border-radius: 50%;
            animation: rise infinite linear;
        }
        @keyframes rise {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) translateX(30px); opacity: 0; }
        }

        /* ----- ELEMENTOS NARRATIVOS ----- */
        .scene-element {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            opacity: 0;
            transform: scale(0.85) translateY(30px);
            transition: opacity 0.7s ease-in-out, transform 0.7s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
            z-index: 3;
        }

        .scene-element.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        /* ----- TIPOGRAFÍA ----- */
        .logo-title {
            font-size: 3.5rem;
            color: #fde100;
            text-shadow: -4px -4px 0 #e41a22, 4px -4px 0 #e41a22, -4px 4px 0 #e41a22, 4px 4px 0 #e41a22, 6px 6px 0 #1c355e;
            letter-spacing: 2px;
            line-height: 1.1;
        }

        .story-text {
            font-size: 2.2rem;
            color: #ffffff;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
            max-width: 600px;
            margin-bottom: 20px;
        }

        .highlight-blue { color: #fde100; text-shadow: 2px 2px 0 #1c355e, -2px -2px 0 #1c355e; }
        .highlight-green { color: #39ff14; text-shadow: 0 0 10px rgba(57,255,20,0.8); }

        .character-placeholder {
            font-size: 5rem;
            margin-top: 20px;
            animation: float 3s ease-in-out infinite;
        }

        .photo-frame {
            width: 220px;
            height: 280px;
            background: #eee;
            border: 8px solid #fff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            margin-bottom: 25px;
            overflow: hidden;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn-rsvp {
            display: inline-block;
            background: #fde100;
            color: #1c355e;
            border: 4px solid #e41a22;
            padding: 15px 35px;
            font-size: 1.4rem;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 6px 0 #bc1319;
            cursor: pointer;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

    <div class="viewer">
        <!-- CAPA ÚNICA DE FONDO -->
        <div id="master-bg"></div>

        <!-- CAPAS DE EFECTOS PARTICULAS (DOM GENÉRICO) -->
        <div id="env-clouds" class="ambient-layer"></div>
        <div id="env-stars" class="ambient-layer"></div>
        <div id="env-dust" class="ambient-layer"></div>

        <!-- ESCENA 1: EL LOGO DE ENTRADA -->
        <div id="scene-1" class="scene-element active">
            <h1 class="logo-title">TOY<br><span style="font-size: 2.5rem; color: #fff; text-shadow: -3px -3px 0 #1c355e, 3px -3px 0 #1c355e;">STORY</span></h1>
            <h2 style="font-size: 1.8rem; margin-top: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.4);">PRESENTA</h2>
        </div>

        <!-- ESCENA 2: LA PRINCESA (CUARTO DE ANDY) -->
        <div id="scene-2" class="scene-element">
            <p class="story-text">La princesa <span class="highlight-blue">IVANA</span> cumplirá <span style="color: #e41a22;">3 Años</span> 👑</p>
            <div class="character-placeholder">🤠</div> 
        </div>

        <!-- ESCENA 3: LA FECHA (PIZZA PLANETA) -->
        <div id="scene-3" class="scene-element">
            <p class="story-text">¡Y te esperamos para el despegue este <span class="highlight-green">Sábado 4 de Julio</span>! 🚀</p>
            <div class="character-placeholder">👽</div>
        </div>

        <!-- ESCENA 4: EL LUGAR (EL OESTE) -->
        <div id="scene-4" class="scene-element">
            <p class="story-text" style="color: #1c355e; text-shadow: none;">La cita es en el Salón <br><span style="color: #e41a22; font-size: 2.8rem;">"El Castillo"</span></p>
            <p style="color: #1c355e; font-size: 1.5rem; margin-top: 10px;">A partir de las <span style="font-weight: bold;">3:00 PM</span> ⏰</p>
        </div>

        <!-- ESCENA 5: LA CUMPLEAÑERA Y EL BOTÓN -->
        <div id="scene-5" class="scene-element">
            <div class="photo-frame">
                <img src="https://via.placeholder.com/220x280?text=Foto+Ivana" alt="Ivana">
            </div>
            <h2 style="font-size: 1.8rem; margin-bottom: 20px; text-shadow: 2px 2px 6px rgba(0,0,0,0.5);">¿TE UNES A LA AVENTURA?</h2>
            
            <a href="https://wa.me/525585473097?text=%C2%A1Hola!%20%F0%9F%91%8B%20Confirmo%20mi%20asistencia%20al%20cumplea%C3%B1os%20de%20Ivana%20%F0%9F%8E%89.%20%C2%A1Ah%C3%AD%20nos%20vemos%20para%20la%20aventura!%20%F0%9F%9A%80" target="_blank" class="btn-rsvp">
                🚀 CONFIRMAR ASISTENCIA
            </a>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN DINÁMICA DE MICRO-EFECTOS EN EL DOM ---
        const cloudsContainer = document.getElementById('env-clouds');
        const starsContainer = document.getElementById('env-stars');
        const dustContainer = document.getElementById('env-dust');

        // Generar 5 nubes sutiles
        for (let i = 0; i < 5; i++) {
            let cloud = document.createElement('div');
            cloud.className = 'cloud-particle';
            cloud.style.top = `${Math.random() * 60 + 5}%`;
            cloud.style.animationDuration = `${Math.random() * 15 + 20}s`;
            cloud.style.animationDelay = `${Math.random() * 10}s`;
            cloud.style.transform = `scale(${Math.random() * 0.5 + 0.5})`;
            cloudsContainer.appendChild(cloud);
        }

        // Generar 35 estrellas espaciales
        for (let i = 0; i < 35; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.width = `${Math.random() * 3 + 1}px`;
            star.style.height = star.style.width;
            star.style.top = `${Math.random() * 100}%`;
            star.style.left = `${Math.random() * 100}%`;
            star.style.animationDuration = `${Math.random() * 2 + 1}s`;
            star.style.animationDelay = `${Math.random() * 2}s`;
            starsContainer.appendChild(star);
        }

        // Generar 20 partículas de polvo desértico
        for (let i = 0; i < 20; i++) {
            let dust = document.createElement('div');
            dust.className = 'dust';
            dust.style.width = `${Math.random() * 4 + 2px}`;
            dust.style.height = dust.style.width;
            dust.style.left = `${Math.random() * 100}%`;
            dust.style.animationDuration = `${Math.random() * 4 + 3}s`;
            dust.style.animationDelay = `${Math.random() * 5}s`;
            dustContainer.appendChild(dust);
        }

        // --- MANIPULACIÓN DEL DOM EN EL SCROLL ---
        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercent = (scrollTop / docHeight) * 100;

            // Rodillo de color
            const masterBg = document.getElementById('master-bg');
            masterBg.style.backgroundPosition = `center ${scrollPercent}%`;

            // Escenas
            const s1 = document.getElementById('scene-1');
            const s2 = document.getElementById('scene-2');
            const s3 = document.getElementById('scene-3');
            const s4 = document.getElementById('scene-4');
            const s5 = document.getElementById('scene-5');

            // Control de Activación de Escenas y Micro-Efectos
            if (scrollPercent >= 0 && scrollPercent < 18) {
                setActiveScene(s1, [s2, s3, s4, s5]);
                setEnvOpacity(1, 0, 0); // Solo nubes activas
            } else if (scrollPercent >= 18 && scrollPercent < 45) {
                setActiveScene(s2, [s1, s3, s4, s5]);
                setEnvOpacity(1, 0, 0); // Siguen las nubes
            } else if (scrollPercent >= 45 && scrollPercent < 72) {
                setActiveScene(s3, [s1, s2, s4, s5]);
                setEnvOpacity(0, 1, 0); // Solo estrellas espaciales activas
            } else if (scrollPercent >= 72 && scrollPercent < 90) {
                setActiveScene(s4, [s1, s2, s3, s5]);
                setEnvOpacity(0, 0, 1); // Solo partículas de polvo del desierto
            } else if (scrollPercent >= 90) {
                setActiveScene(s5, [s1, s2, s3, s4]);
                setEnvOpacity(0, 0, 0.7); // El desierto se atenúa un poco con la foto
            }
        });

        function setActiveScene(activeElement, inactiveElements) {
            activeElement.classList.add('active');
            inactiveElements.forEach(el => el.classList.remove('active'));
        }

        function setEnvOpacity(clouds, stars, dust) {
            cloudsContainer.style.opacity = clouds;
            starsContainer.style.opacity = stars;
            dustContainer.style.opacity = dust;
        }
    </script>

</body>
</html>
