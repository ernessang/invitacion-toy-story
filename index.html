<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Al Infinito y Más Allá! - Mi Fiesta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Fredoka', sans-serif; }
        /* Efecto de Texto 3D estilo Logotipo de Toy Story */
        .toy-story-text {
            color: #facc15; /* Amarillo brillante */
            -webkit-text-stroke: 3px #1d4ed8; /* Borde Azul Rey */
            text-shadow: 
                4px 4px 0px #b91c1c, /* Sombra Roja 3D */
                7px 7px 0px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-0 sm:p-4 overflow-x-hidden">

    <div class="escenario-canvas relative w-full max-w-5xl aspect-[9/16] md:aspect-video bg-gradient-to-b from-sky-400 via-sky-300 to-sky-200 overflow-hidden rounded-none sm:rounded-2xl shadow-2xl border-4 border-slate-900">
        
        <div class="absolute inset-0 opacity-20 pointer-events-none">
            <div class="absolute top-[10%] left-[10%] w-32 h-12 bg-white rounded-full filter blur-sm"></div>
            <div class="absolute top-[25%] right-[15%] w-48 h-16 bg-white rounded-full filter blur-sm"></div>
            <div class="absolute top-[60%] left-[5%] w-40 h-14 bg-white rounded-full filter blur-sm"></div>
        </div>

        <button id="audio-toggle" class="absolute top-4 right-4 z-30 w-12 h-12 bg-yellow-400 hover:bg-yellow-500 border-4 border-blue-600 rounded-full flex items-center justify-center text-xl shadow-lg opacity-0 transition-transform cursor-pointer">
            默默 🔇
        </button>

        <div class="cumpleanera absolute bottom-[8%] md:bottom-[12%] left-1/2 -translate-x-1/2 w-48 h-64 md:w-56 md:h-80 bg-gradient-to-t from-amber-500 to-yellow-400 rounded-3xl border-4 border-white shadow-xl flex flex-col items-center justify-center p-4 text-center z-10 opacity-0">
            <span class="text-4xl mb-2">⭐</span>
            <p class="text-white font-bold uppercase tracking-wider text-sm drop-shadow">Tu Personaje o Foto Aquí</p>
            <p class="text-yellow-100 text-xs mt-1">src/img/nina.png</p>
        </div>

        <div class="info-tarjeta absolute top-[15%] md:top-auto md:bottom-[12%] left-4 right-4 md:left-auto md:right-8 md:w-[38%] bg-white/95 border-8 border-yellow-400 rounded-3xl p-6 shadow-2xl z-20 opacity-0">
            <h1 class="toy-story-text text-4xl md:text-5xl font-black text-center uppercase tracking-wider leading-none select-none">
                ¡Mi Fiesta!
            </h1>
            <p class="text-center text-blue-600 font-bold text-sm tracking-widest uppercase mt-2">¡Al Infinito y más allá!</p>
            
            <div class="mt-5 space-y-3 text-slate-700 text-base md:text-lg font-semibold">
                <div class="flex justify-between border-b-4 border-dashed border-slate-100 pb-1">
                    <span>📅 FECHA:</span>
                    <span class="font-bold text-blue-700">25 de Julio</span>
                </div>
                <div class="flex justify-between border-b-4 border-dashed border-slate-100 pb-1">
                    <span>⏰ HORA:</span>
                    <span class="font-bold text-blue-700">4:00 PM</span>
                </div>
                <div class="flex justify-between">
                    <span>📍 LUGAR:</span>
                    <span class="font-bold text-red-600 text-right">Salón Andy</span>
                </div>
            </div>

            <a href="https://wa.me/521234567890?text=¡Sí+asistiré+a+la+fiesta!" 
               target="_blank"
               class="block text-center mt-6 bg-red-500 hover:bg-red-600 text-white font-black py-3 px-4 rounded-2xl border-b-8 border-red-700 active:border-b-0 active:translate-y-[8px] transition-all transform uppercase tracking-widest text-sm md:text-base shadow-md">
                🚀 Confirmar Asistencia
            </a>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="./src/js/main.js"></script>
</body>
</html>
