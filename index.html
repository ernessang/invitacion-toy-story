<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación Toy Story</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #4ba3e3 0%, #7bc6f6 100%);
            font-family: 'Arial Black', Impact, sans-serif;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* ----- CONTENEDOR DE NUBES EN CSS ----- */
        .sky {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            z-index: 1;
            pointer-events: none;
        }

        /* Estructura geométrica de la nube clásica de Toy Story */
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            width: 120px;
            height: 40px;
            border-radius: 20px;
            animation: moveClouds linear infinite;
        }

        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
        }

        .cloud::before {
            width: 50px;
            height: 50px;
            top: -25px;
            left: 15px;
        }

        .cloud::after {
            width: 70px;
            height: 70px;
            top: -45px;
            left: 40px;
        }

        /* Configuración de tiempos y posiciones de las nubes */
        .c1 { top: 10%; left: -150px; transform: scale(0.8); animation-duration: 25s; }
        .c2 { top: 25%; left: -150px; transform: scale(1.1); animation-duration: 35s; animation-delay: 5s; }
        .c3 { top: 15%; left: -150px; transform: scale(0.6); animation-duration: 20s; animation-delay: 12s; }
        .c4 { top: 35%; left: -150px; transform: scale(0.9); animation-duration: 30s; animation-delay: 2s; }

        @keyframes moveClouds {
            0% { left: -150px; }
            100% { left: 100vw; }
        }

        /* ----- CONTENEDOR DE TEXTOS ----- */
        .invitation-container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .toy-title {
            font-size: 3.5rem;
            color: #fde100;
            text-shadow: 
                -3px -3px 0 #e41a22,  
                 3px -3px 0 #e41a22,
                -3px  3px 0 #e41a22,
                 3px  3px 0 #e41a22,
                 5px  5px 0 #1c355e;
            letter-spacing: 2px;
            animation: bounceIn 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .toy-subtitle {
            font-size: 1.6rem;
            color: #ffffff;
            margin-top: 15px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.8s forwards;
        }

        @keyframes bounceIn {
            0% { transform: scale(0); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Cielo con Nubes Animadas CSS -->
    <div class="sky">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>
        <div class="cloud c4"></div>
    </div>

    <!-- Contenedor principal de la invitación -->
    <div class="invitation-container">
        <header>
            <h1 class="toy-title">¡ESTÁS INVITADO!</h1>
            <h2 class="toy-subtitle">A una aventura inolvidable</h2>
        </header>
    </div>

</body>
</html>
